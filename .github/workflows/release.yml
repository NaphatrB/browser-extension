name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - run: npm ci
      - run: npm run build
      - run: npm run pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mullvad-browser-extension-*.xpi
            mullvad-browser-extension-*.zip
          generate_release_notes: true
